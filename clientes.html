<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRV PDV — Clientes</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/clientes.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#F98948" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
        <path d="M7 8h3M7 11h5M14 8l2 3-2 3"/>
      </svg>
      <span class="sidebar-logo-text">CRV <span>PDV</span></span>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>
      <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard" class="nav-icon"></i>Dashboard</a>
      <a href="caixa.html" class="nav-item"><i data-lucide="wallet" class="nav-icon"></i>Caixa / PDV</a>
      <a href="vendas.html" class="nav-item"><i data-lucide="shopping-cart" class="nav-icon"></i>Vendas</a>
      <span class="nav-section-label">Cadastros</span>
      <a href="produtos.html" class="nav-item"><i data-lucide="package" class="nav-icon"></i>Produtos</a>
      <a href="clientes.html" class="nav-item active"><i data-lucide="users" class="nav-icon"></i>Clientes</a>
      <span class="nav-section-label">Relatórios</span>
      <a href="relatorios.html" class="nav-item"><i data-lucide="bar-chart-2" class="nav-icon"></i>Relatórios</a>
    </nav>
    <div class="sidebar-footer">CRV PDV v1.0 · Demo</div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div style="display:flex;flex-direction:column;min-height:100vh;">

    <!-- TOPBAR -->
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="btn-menu" id="btnMenu"><i data-lucide="menu" width="22" height="22"></i></button>
        <span class="topbar-title">Clientes</span>
      </div>
      <div class="topbar-actions">
        <div class="caixa-status">
          <span class="status-dot closed" id="statusDot"></span>
          <span id="statusText">Caixa fechado</span>
        </div>
        <div class="topbar-datetime" id="topbarDatetime"></div>
        <button class="theme-toggle" id="themeToggle"><i data-lucide="moon" id="iconTheme"></i></button>
        <div class="topbar-avatar"><span>D</span></div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="main-content">

      <!-- PAGE HEADER -->
      <div class="page-header">
        <div>
          <h2>Clientes</h2>
          <p id="subtitleClientes">0 clientes cadastrados</p>
        </div>
        <button class="btn-secondary" onclick="abrirModalNovo()">
          <i data-lucide="user-plus" width="16" height="16"></i>
          <span>Novo Cliente</span>
        </button>
      </div>

      <!-- FILTRO -->
      <div class="clientes-filtros card">
        <div class="filtro-search-wrap" style="flex:1;">
          <i data-lucide="search" width="15" height="15"></i>
          <input
            class="input filtro-search"
            type="text"
            id="filtroTexto"
            placeholder="Buscar por nome ou telefone..."
            oninput="renderClientes()"
          />
        </div>
        <div class="filtros-right">
          <button class="filtro-btn active" data-filter="todos" onclick="setFiltro(this,'todos')">Todos</button>
          <button class="filtro-btn" data-filter="recentes" onclick="setFiltro(this,'recentes')">Recentes</button>
        </div>
      </div>

      <!-- LISTA -->
      <div class="clientes-lista" id="clientesLista"></div>

    </main>
  </div>
</div>

<!-- MODAL: Novo / Editar cliente -->
<div class="modal-overlay" id="modalCliente" style="display:none;">
  <div class="modal card" style="max-width:440px;">
    <div class="modal-header">
      <h3 id="modalClienteTitulo">Novo Cliente</h3>
      <button class="btn-ghost" style="padding:6px;" onclick="fecharModal()">
        <i data-lucide="x" width="16" height="16"></i>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="clienteId" />

      <div class="input-group">
        <label class="input-label" for="clienteNome">Nome *</label>
        <input class="input" type="text" id="clienteNome" placeholder="Nome completo" />
      </div>

      <div class="input-group">
        <label class="input-label" for="clienteTelefone">
          <i data-lucide="phone" width="11" height="11"></i>
          Telefone / WhatsApp
        </label>
        <input
          class="input"
          type="tel"
          id="clienteTelefone"
          placeholder="(15) 99999-9999"
          oninput="mascaraTelefone(this)"
        />
      </div>

      <div class="input-group">
        <label class="input-label" for="clienteObs">Observação</label>
        <input class="input" type="text" id="clienteObs" placeholder="Ex: Jogador arena 28, cliente VIP..." />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn-secondary" onclick="salvarCliente()">
        <i data-lucide="save" width="15" height="15"></i>
        <span>Salvar</span>
      </button>
    </div>
  </div>
</div>

<!-- MODAL: Confirmar exclusão -->
<div class="modal-overlay" id="modalExcluir" style="display:none;">
  <div class="modal card" style="max-width:360px;text-align:center;">
    <div style="display:flex;justify-content:center;margin-bottom:16px;">
      <div style="width:56px;height:56px;border-radius:var(--radius-lg);background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.2);display:flex;align-items:center;justify-content:center;color:#FF5050;">
        <i data-lucide="user-x" width="24" height="24"></i>
      </div>
    </div>
    <h3 style="margin-bottom:8px;">Remover cliente?</h3>
    <p id="msgExcluir" style="font-size:0.88rem;color:var(--text-muted);margin-bottom:20px;"></p>
    <div class="modal-footer" style="justify-content:center;">
      <button class="btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn-danger" id="btnConfirmarExcluir">
        <i data-lucide="trash-2" width="15" height="15"></i>
        Remover
      </button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/clientes.js"></script>
</body>
</html>
