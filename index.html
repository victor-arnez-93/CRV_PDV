<!-- TELA DE LOGIN -->

<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRV PDV — Login</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Toggle de tema -->
  <div class="login-topbar">
    <button class="theme-toggle" id="themeToggle" title="Alternar tema">
      <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>

  <div class="login-page">

    <!-- PAINEL ESQUERDO — BRANDING -->
    <div class="login-brand">
      <div class="brand-content">
      <img src="assets/logo1.png" alt="CRV PDV" class="login-brand-logo" />
<div class="brand-subtitle">Controle de Caixa</div>


        <div class="brand-tags">
          <span class="brand-tag">Fluxo de Caixa</span>
          <span class="brand-tag">PDV</span>
          <span class="brand-tag">Offline Ready</span>
        </div>

        <div class="brand-ticker">
          &gt; Sistema iniciado com sucesso_<br>
          &gt; Pronto para operar&nbsp;■
        </div>
      </div>
    </div>

    <!-- PAINEL DIREITO — FORMULÁRIO -->
    <div class="login-form-panel">

      <!-- Logo mobile (só aparece em telas pequenas) -->
      <div class="login-mobile-logo">
        <img src="assets/logo1.png" alt="CRV PDV" class="login-mobile-logo-img" />
        <p>Controle de Caixa</p>
      </div>


      <div class="login-card">
        <div class="login-header">
          <h2>Bem-vindo de volta</h2>
          <p>Faça login para acessar o sistema</p>
        </div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
          <div class="input-group">
            <label class="input-label" for="email">E-mail</label>
            <input
              class="input"
              type="email"
              id="email"
              placeholder="operador@seucomercio.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="password">Senha</label>
            <input
              class="input"
              type="password"
              id="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit" class="btn-secondary" id="btnLogin">
            <span>Entrar no sistema</span>
          </button>

          <div class="login-divider"><span>ou</span></div>

          <button type="button" class="btn-primary" onclick="entrarDemo()">
            <span>Entrar como Demo</span>
          </button>
        </form>
      </div>

      <div class="login-footer">
        <p>CRV PDV v1.0 &nbsp;·&nbsp; <span>CRV Soluções em TI</span> &nbsp;·&nbsp; Tatuí, SP</p>
      </div>
    </div>

  </div>

<script>
  (function() {
    const saved = localStorage.getItem('crv-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
  })();
</script>

<script src="js/app.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const html = document.documentElement;
    const moon = document.getElementById('iconMoon');
    const sun  = document.getElementById('iconSun');

    const syncIcons = () => {
      const isDark = html.getAttribute('data-theme') === 'dark';
      moon.style.display = isDark ? 'block' : 'none';
      sun.style.display  = isDark ? 'none'  : 'block';
    };
    syncIcons();

    document.getElementById('themeToggle').addEventListener('click', () => {
      setTimeout(syncIcons, 10);
    });
  });

  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    btn.innerHTML = '<span>Entrando...</span>';
    btn.disabled = true;
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
  }

  function entrarDemo() {
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
