<!-- TELA DE LOGIN -->

<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRV PDV — Login</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* Layout exclusivo da tela de login */
    .login-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--bg-primary);
    }

    /* Painel esquerdo — branding */
    .login-brand {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 48px;
      position: relative;
      overflow: hidden;
    }

    /* Grid decorativo retrô */
    .login-brand::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
    }

    /* Glow central */
    .login-brand::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249,137,72,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand-content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .brand-logo-wrap {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-lg);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--glow-orange);
    }

    .brand-logo-wrap svg {
      width: 44px;
      height: 44px;
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-primary);
      line-height: 1;
    }

    .brand-title span {
      color: var(--crv-orange);
    }

    .brand-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: var(--font-display);
    }

    .brand-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    .brand-tag {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    /* Terminal ticker — vibe retrô */
    .brand-ticker {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: var(--crv-green);
      background: rgba(0,255,156,0.05);
      border: 1px solid rgba(0,255,156,0.15);
      border-radius: var(--radius-md);
      padding: 10px 16px;
      letter-spacing: 0.05em;
      opacity: 0.8;
    }

    /* Painel direito — formulário */
    .login-form-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 48px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .login-header {
      margin-bottom: 32px;
    }

    .login-header h2 {
      font-size: 1.8rem;
      margin-bottom: 6px;
    }

    .login-header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-form .btn-primary,
    .login-form .btn-secondary {
      width: 100%;
      margin-top: 8px;
      font-size: 1rem;
      padding: 15px;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
    }

    .login-divider::before,
    .login-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .login-divider span {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .login-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--font-display);
      letter-spacing: 0.04em;
    }

    .login-footer span {
      color: var(--crv-orange);
    }

    /* Theme toggle no canto */
    .login-topbar {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .login-page {
        grid-template-columns: 1fr;
      }

      .login-brand {
        display: none;
      }

      .login-form-panel {
        padding: 40px 24px;
      }

      /* Logo compacto no topo mobile */
      .login-mobile-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        margin-bottom: 32px;
        text-align: center;
      }

      .login-mobile-logo h1 {
        font-size: 2rem;
        letter-spacing: 0.06em;
      }

      .login-mobile-logo h1 span { color: var(--crv-orange); }

      .login-mobile-logo p {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
      }
    }

    @media (min-width: 769px) {
      .login-mobile-logo { display: none; }
    }
  </style>
</head>
<body>

  <!-- Toggle de tema -->
  <div class="login-topbar">
    <button class="theme-toggle" id="themeToggle" title="Alternar tema">
      <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>

  <div class="login-page">

    <!-- PAINEL ESQUERDO — BRANDING -->
    <div class="login-brand">
      <div class="brand-content">
        <div class="brand-logo-wrap">
          <!-- Ícone provisório — substituir por logo.svg -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#F98948" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
            <path d="M7 8h3M7 11h5M14 8l2 3-2 3"/>
          </svg>
        </div>

        <div>
          <div class="brand-title">CRV <span>PDV</span></div>
          <div class="brand-subtitle">Cashflow System</div>
        </div>

        <div class="brand-tags">
          <span class="brand-tag">Fluxo de Caixa</span>
          <span class="brand-tag">PDV</span>
          <span class="brand-tag">Offline Ready</span>
        </div>

        <div class="brand-ticker">
          &gt; Sistema iniciado com sucesso_<br>
          &gt; Pronto para operar&nbsp;■
        </div>
      </div>
    </div>

    <!-- PAINEL DIREITO — FORMULÁRIO -->
    <div class="login-form-panel">

      <!-- Logo mobile (só aparece em telas pequenas) -->
      <div class="login-mobile-logo">
        <h1>CRV <span>PDV</span></h1>
        <p>Cashflow System</p>
      </div>

      <div class="login-card">
        <div class="login-header">
          <h2>Bem-vindo de volta</h2>
          <p>Faça login para acessar o sistema</p>
        </div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
          <div class="input-group">
            <label class="input-label" for="email">E-mail</label>
            <input
              class="input"
              type="email"
              id="email"
              placeholder="operador@seucomercio.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="password">Senha</label>
            <input
              class="input"
              type="password"
              id="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit" class="btn-secondary" id="btnLogin">
            <span>Entrar no sistema</span>
          </button>

          <div class="login-divider"><span>ou</span></div>

          <button type="button" class="btn-primary" onclick="entrarDemo()">
            <span>Entrar como Demo</span>
          </button>
        </form>
      </div>

      <div class="login-footer">
        <p>CRV PDV v1.0 &nbsp;·&nbsp; <span>CRV Tech</span> &nbsp;·&nbsp; Tatuí, SP</p>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
  <script>
    // ===== THEME TOGGLE =====
    const html = document.documentElement;
    const moon = document.getElementById('iconMoon');
    const sun  = document.getElementById('iconSun');

    document.getElementById('themeToggle').addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      moon.style.display = isDark ? 'none'  : 'block';
      sun.style.display  = isDark ? 'block' : 'none';
      localStorage.setItem('crv-theme', isDark ? 'light' : 'dark');
    });

    // Restaurar tema salvo
    const savedTheme = localStorage.getItem('crv-theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    if (savedTheme === 'light') {
      moon.style.display = 'none';
      sun.style.display  = 'block';
    }

    // ===== LOGIN =====
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      btn.innerHTML = '<span>Entrando...</span>';
      btn.disabled = true;
      // Supabase auth será integrado em auth.js
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1000);
    }

    function entrarDemo() {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
